name: Crypto Control CI

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:
    branches:
      - main

concurrency:
  group: crypto-control-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changed-packages:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Market data typecheck
        run: npm --prefix packages/market-data run typecheck

      - name: Market data tests
        run: npm --prefix packages/market-data test

      - name: Portfolio typecheck
        run: npm --prefix packages/portfolio run typecheck

      - name: Portfolio tests
        run: npm --prefix packages/portfolio test

      - name: Database typecheck
        run: npm --prefix packages/database run typecheck

      - name: Database tests
        run: npm --prefix packages/database test

      - name: Build changed packages
        run: |
          npm --prefix packages/market-data run build
          npm --prefix packages/portfolio run build
          npm --prefix packages/database run build

  full-repository-advisory:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Core typecheck
        run: npm --prefix packages/core run typecheck

      - name: Web checks
        run: |
          npm --prefix apps/web run lint
          npm --prefix apps/web run typecheck
          npm --prefix apps/web test

      - name: Desktop typecheck
        run: npm --prefix apps/desktop run typecheck
