name: Crypto Control CI

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:
    branches:
      - main

concurrency:
  group: crypto-control-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  market-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm --prefix packages/market-data run typecheck
      - name: Tests
        run: npm --prefix packages/market-data test
      - name: Build
        run: npm --prefix packages/market-data run build

  portfolio:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Typecheck
        shell: bash
        run: |
          set +e
          npm --prefix packages/portfolio run typecheck > /tmp/portfolio-tsc.log 2>&1
          status=$?
          tail -n 120 /tmp/portfolio-tsc.log
          exit $status
      - name: Tests
        run: npm --prefix packages/portfolio test
      - name: Build
        run: npm --prefix packages/portfolio run build

  database:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Typecheck
        shell: bash
        run: |
          set +e
          npm --prefix packages/database run typecheck > /tmp/database-tsc.log 2>&1
          status=$?
          tail -n 120 /tmp/database-tsc.log
          exit $status
      - name: Tests
        run: npm --prefix packages/database test
      - name: Build
        run: npm --prefix packages/database run build

  full-repository-advisory:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Core typecheck
        shell: bash
        run: |
          set +e
          npm --prefix packages/core run typecheck > /tmp/core-tsc.log 2>&1
          status=$?
          tail -n 120 /tmp/core-tsc.log
          exit $status
      - name: Web checks
        if: always()
        run: |
          npm --prefix apps/web run lint
          npm --prefix apps/web run typecheck
          npm --prefix apps/web test
      - name: Desktop typecheck
        if: always()
        shell: bash
        run: |
          set +e
          npm --prefix apps/desktop run typecheck > /tmp/desktop-tsc.log 2>&1
          status=$?
          tail -n 120 /tmp/desktop-tsc.log
          exit $status
