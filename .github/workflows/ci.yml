name: Crypto Control CI

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:
    branches:
      - main

concurrency:
  group: crypto-control-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  market-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm --prefix packages/market-data run typecheck
      - name: Tests
        id: market_tests
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm --prefix packages/market-data test > market-tests.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit $status
      - name: Upload market test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: market-tests
          path: market-tests.log
      - name: Fail on market test errors
        if: steps.market_tests.outputs.status != '0'
        run: |
          cat market-tests.log
          exit 1
      - name: Build
        run: npm --prefix packages/market-data run build

  portfolio:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm --prefix packages/portfolio run typecheck
      - name: Tests
        run: npm --prefix packages/portfolio test
      - name: Build
        run: npm --prefix packages/portfolio run build

  database:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Build local type dependencies
        run: |
          npm --prefix packages/market-data run build
          npm --prefix packages/portfolio run build
      - name: Typecheck
        run: npm --prefix packages/database run typecheck
      - name: Tests
        run: npm --prefix packages/database test
      - name: Build
        run: npm --prefix packages/database run build

  application-integration:
    needs: [market-data, portfolio, database]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Build shared packages in dependency order
        run: |
          npm --prefix packages/market-data run build
          npm --prefix packages/portfolio run build
          npm --prefix packages/core run build
          npm --prefix packages/database run build
          npm --prefix packages/coinbase-sync run build
      - name: Web typecheck and tests
        run: |
          npm --prefix apps/web run typecheck
          npm --prefix apps/web test
      - name: Web production build
        run: npm --prefix apps/web run build
      - name: Electron typecheck and build
        run: |
          npm --prefix apps/desktop run typecheck
          npm --prefix apps/desktop run build
